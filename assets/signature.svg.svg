<svg viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Daksh Choudhary signature banner">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#11121c">
        <animate attributeName="stop-color" values="#11121c;#161a2e;#11121c" dur="10s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1a1b3a">
        <animate attributeName="stop-color" values="#1a1b3a;#23274c;#1a1b3a" dur="10s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="textBand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0c0d15" stop-opacity="0"/>
      <stop offset="22%" stop-color="#0c0d15" stop-opacity="0.88"/>
      <stop offset="78%" stop-color="#0c0d15" stop-opacity="0.88"/>
      <stop offset="100%" stop-color="#0c0d15" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="scanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#7aa2f7" stop-opacity="0"/>
      <stop offset="50%" stop-color="#7aa2f7" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#7aa2f7" stop-opacity="0"/>
    </linearGradient>

    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="300" fill="url(#bgGrad)"/>

  <!-- network lines (static, faint) -->
  <g stroke="#7aa2f7" stroke-opacity="0.16" stroke-width="1">
    <line x1="80" y1="60" x2="180" y2="200"/>
    <line x1="180" y1="200" x2="260" y2="40"/>
    <line x1="260" y1="40" x2="340" y2="230"/>
    <line x1="340" y1="230" x2="420" y2="90"/>
    <line x1="420" y1="90" x2="500" y2="180"/>
    <line x1="500" y1="180" x2="560" y2="260"/>
    <line x1="560" y1="260" x2="620" y2="50"/>
    <line x1="620" y1="50" x2="700" y2="140"/>
    <line x1="700" y1="140" x2="760" y2="220"/>
    <line x1="760" y1="220" x2="840" y2="70"/>
    <line x1="840" y1="70" x2="900" y2="190"/>
    <line x1="900" y1="190" x2="960" y2="30"/>
    <line x1="960" y1="30" x2="1020" y2="150"/>
    <line x1="1020" y1="150" x2="1080" y2="240"/>
    <line x1="1080" y1="240" x2="1140" y2="90"/>
    <line x1="180" y1="200" x2="420" y2="90"/>
    <line x1="420" y1="90" x2="620" y2="50"/>
    <line x1="500" y1="180" x2="840" y2="70"/>
    <line x1="760" y1="220" x2="1020" y2="150"/>
    <line x1="840" y1="70" x2="1080" y2="240"/>
    <line x1="260" y1="40" x2="560" y2="260"/>
  </g>

  <!-- nodes (pulsing) -->
  <g fill="#7aa2f7" filter="url(#glow)">
    <circle cx="80" cy="60" r="3"><animate attributeName="r" values="3;6;3" dur="2.6s" begin="0s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" begin="0s" repeatCount="indefinite"/></circle>
    <circle cx="180" cy="200" r="3"><animate attributeName="r" values="3;6;3" dur="3s" begin="0.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="260" cy="40" r="3"><animate attributeName="r" values="3;6;3" dur="2.2s" begin="0.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" begin="0.4s" repeatCount="indefinite"/></circle>
    <circle cx="340" cy="230" r="3"><animate attributeName="r" values="3;6;3" dur="3.4s" begin="0.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3.4s" begin="0.6s" repeatCount="indefinite"/></circle>
    <circle cx="420" cy="90" r="3"><animate attributeName="r" values="3;6;3" dur="2.8s" begin="0.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="180" r="3"><animate attributeName="r" values="3;6;3" dur="2.4s" begin="1s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" begin="1s" repeatCount="indefinite"/></circle>
    <circle cx="560" cy="260" r="3"><animate attributeName="r" values="3;6;3" dur="3.2s" begin="1.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3.2s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="620" cy="50" r="3"><animate attributeName="r" values="3;6;3" dur="2.6s" begin="1.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" begin="1.4s" repeatCount="indefinite"/></circle>
    <circle cx="700" cy="140" r="3"><animate attributeName="r" values="3;6;3" dur="3s" begin="1.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="1.6s" repeatCount="indefinite"/></circle>
    <circle cx="760" cy="220" r="3"><animate attributeName="r" values="3;6;3" dur="2.2s" begin="1.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="2.2s" begin="1.8s" repeatCount="indefinite"/></circle>
    <circle cx="840" cy="70" r="3"><animate attributeName="r" values="3;6;3" dur="3.4s" begin="2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3.4s" begin="2s" repeatCount="indefinite"/></circle>
    <circle cx="900" cy="190" r="3"><animate attributeName="r" values="3;6;3" dur="2.8s" begin="2.2s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="2.8s" begin="2.2s" repeatCount="indefinite"/></circle>
    <circle cx="960" cy="30" r="3"><animate attributeName="r" values="3;6;3" dur="2.4s" begin="2.4s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="2.4s" begin="2.4s" repeatCount="indefinite"/></circle>
    <circle cx="1020" cy="150" r="3"><animate attributeName="r" values="3;6;3" dur="3.2s" begin="2.6s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3.2s" begin="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1080" cy="240" r="3"><animate attributeName="r" values="3;6;3" dur="2.6s" begin="2.8s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="2.6s" begin="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="90" r="3"><animate attributeName="r" values="3;6;3" dur="3s" begin="3s" repeatCount="indefinite"/><animate attributeName="opacity" values="0.5;1;0.5" dur="3s" begin="3s" repeatCount="indefinite"/></circle>
  </g>

  <!-- traveling light pulses along selected connections -->
  <g fill="#bb9af7" filter="url(#glow)">
    <circle r="3">
      <animateMotion path="M 180,200 L 420,90" dur="3.6s" begin="0s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.6s" begin="0s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion path="M 420,90 L 620,50" dur="4.1s" begin="0.7s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="4.1s" begin="0.7s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion path="M 500,180 L 840,70" dur="4.8s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="4.8s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion path="M 760,220 L 1020,150" dur="3.9s" begin="0.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="3.9s" begin="0.3s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion path="M 840,70 L 1080,240" dur="4.4s" begin="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="4.4s" begin="2s" repeatCount="indefinite"/>
    </circle>
    <circle r="3">
      <animateMotion path="M 260,40 L 560,260" dur="5.2s" begin="1s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;1;1;0" keyTimes="0;0.1;0.85;1" dur="5.2s" begin="1s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- vertical scanline sweep -->
  <rect x="0" y="-10" width="1200" height="14" fill="url(#scanGrad)">
    <animateTransform attributeName="transform" type="translate" values="0,0;0,310;0,0" dur="7s" repeatCount="indefinite"/>
  </rect>

  <!-- text contrast band, then name -->
  <rect x="0" y="98" width="1200" height="104" fill="url(#textBand)"/>
  <text x="600" y="138" text-anchor="middle" font-family="'SF Mono','Consolas','Menlo',monospace" font-size="42" font-weight="700" fill="#e8ecfb" letter-spacing="5">DAKSH CHOUDHARY</text>
  <text x="600" y="172" text-anchor="middle" font-family="'SF Mono','Consolas','Menlo',monospace" font-size="14" fill="#7dcfff" letter-spacing="3">FRONTEND ENGINEER — BUILDING TOWARD AI</text>
</svg>
